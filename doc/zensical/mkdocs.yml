# FluidSynth developer documentation – Zensical site configuration
#
# Build:
#   pip install -r requirements.txt
#   zensical build
#
# The API reference pages (docs/api/*.md) and settings pages (docs/settings/*.md)
# are generated at build time; see doc/CMakeLists.txt for the CMake targets that
# drive this.

site_name: FluidSynth Developer Documentation
site_url: https://www.fluidsynth.org/api/
site_description: >-
  API documentation and developer guide for the FluidSynth software synthesizer library
site_author: FluidSynth contributors

repo_name: FluidSynth/fluidsynth
repo_url: https://github.com/FluidSynth/fluidsynth

copyright: >-
  Copyright &copy; 2003–2026 Peter Hanappe and others –
  Licensed under the
  <a href="https://creativecommons.org/licenses/by-sa/3.0/">CC BY-SA 3.0</a>

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - Usage Guide:
      - usage/index.md
      - Creating Settings: usage/creating-settings.md
      - Creating the Synthesizer: usage/creating-synth.md
      - Loading SoundFonts: usage/loading-soundfonts.md
      - Audio Driver: usage/audio-driver.md
      - Using the Synthesizer: usage/using-synth.md
      - Sending MIDI Events: usage/sending-midi.md
      - Real-time MIDI: usage/realtime-midi.md
      - MIDI File Player: usage/midi-player.md
      - File Renderer: usage/file-renderer.md
      - MIDI Player from Memory: usage/midi-player-mem.md
      - MIDI Router: usage/midi-router.md
      - Sequencer: usage/sequencer.md
      - Shell Interface: usage/shell.md
      - Multi-channel Rendering: usage/multi-channel.md
      - Synthesis Context: usage/synth-context.md
      - Advanced Features: usage/advanced.md
  - API Reference:
      - api/index.md
  - Settings Reference:
      - settings/index.md
  - LADSPA Effects: ladspa.md
  - Reverb Engines: reverbators.md
  - Changelog: changelog.md
